<script>
(async function() {
  const PWD = "Ristorantebutterfly";
  async function sha256(s) {
    const b = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(s));
    return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,"0")).join("");
  }
  const correctHash = await sha256(PWD);

  function showApp() {
    document.getElementById("login-screen").style.display = "none";
    const root = document.getElementById("app-root");
    root.style.display = "block";
    if (!window.__appMounted) {
      window.__appMounted = true;
      // Execute the inline app script
      Babel.transformScriptTags();
    }
  }

  // Already logged in this session?
  if (sessionStorage.getItem("bf_ok") === correctHash) { showApp(); return; }

  async function tryLogin() {
    const val = document.getElementById("pwd").value.trim();
    if (!val) return;
    const h = await sha256(val);
    if (h === correctHash) {
      sessionStorage.setItem("bf_ok", correctHash);
      showApp();
    } else {
      document.getElementById("err").textContent = "Password errata — riprova";
      document.getElementById("pwd").value = "";
      document.getElementById("pwd").focus();
    }
  }

  document.getElementById("login-btn").addEventListener("click", tryLogin);
  document.getElementById("pwd").addEventListener("keydown", e => { if(e.key==="Enter") tryLogin(); });
})();
</script>

const MODES = { HOME: "home", CARDS: "cards", QUIZ: "quiz", SPEED: "speed", REVIEW: "review" };

async function callClaude(prompt) {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1000,
      messages: [{ role: "user", content: prompt }],
    }),
  });
  const d = await res.json();
  if (!d.content || d.error) throw new Error(d.error?.message || "API error");
  return d.content.map(b => b.text || "").join("");
}

async function genScript(dish) {
  return callClaude(
    `Sei il maître del Ristorante Butterfly (1 stella Michelin, Lucca), Chef Fabrizio Girasoli.
Crea uno script di presentazione al tavolo per: "${dish.name}"
Descrizione: ${dish.it}

Formato ESATTO (nessun testo aggiuntivo):
ANNUNCIO: [1 frase che annuncia il piatto, nome poetico e ingredienti principali]
TECNICA: [1-2 frasi su tecnica di cottura e profilo aromatico]
NOTA: [1 frase su abbinamento vino o allergenicità rilevante]

Massimo 80 parole totali. Tono raffinato da alta cucina italiana.`
  );
}

async function genQuiz(dish, script) {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 600,
      system: "Sei un trainer per sommelier e maître di alta cucina. Rispondi SEMPRE e SOLO con JSON puro, nessun altro testo.",
      messages: [{
        role: "user",
        content: `Piatto: ${dish.name}
Descrizione: ${dish.it}
Script: ${script}

Crea UNA domanda quiz sulla presentazione. Formato JSON:
{"question":"...","options":["A) ...","B) ...","C) ...","D) ..."],"correct":"A","explanation":"..."}`
      }],
    }),
  });
  const d = await res.json();
  if (!d.content || d.error) throw new Error(d.error?.message || "API error");
  const raw = d.content.map(b => b.text || "").join("").trim();
  const cleaned = raw.replace(/```json|```/g, "").trim();
  const match = cleaned.match(/\{[\s\S]*\}/);
  if (!match) throw new Error("No JSON in response: " + raw.slice(0, 100));
  return JSON.parse(match[0]);
}

  // Quiz load

    setLoading(true);
    try {
      const s = await getScript(dish);
      const q = await genQuiz(dish, s);
      setQuizData(q);
    } catch (e) {
      console.error("Quiz error:", e);
      setQuizError(true);
    }
    setLoading(false);

  useEffect(() => {
    if (mode !== MODES.QUIZ || !dish) return;
    loadQuiz();

  // Speed

    const pool = activeMenu === "tutti" ? ALL_DISHES : ALL_DISHES.filter(d => d.menus.includes(activeMenu));
    const q = [...pool].sort(() => Math.random() - 0.5).slice(0, Math.min(8, pool.length));
    setSpeedQ(q); setSpeedI(0); setSpeedScore(0);
    setTimeLeft(30); setSpeedActive(true); setSpeedDone(false);
    setLoading(true);
    await getScript(q[0]);
    setLoading(false);
  };

  useEffect(() => {
    if (!speedActive) return;
    timerRef.current = setInterval(() => {
      setTimeLeft(t => {
        if (t <= 1) { clearInterval(timerRef.current); setSpeedActive(false); setSpeedDone(true); return 0; }
        return t - 1;
      });
    }, 1000);
    return () => clearInterval(timerRef.current);
  }, [speedActive]);

  const speedNext = async (knew) => {
    if (knew) { setSpeedScore(s => s + 1); mark(speedQ[speedI], "known"); }
    else mark(speedQ[speedI], "review");
    const next = speedI + 1;

    setSpeedI(next);
    setLoading(true);
    await getScript(speedQ[next]);

                background: "transparent", border: "1px solid #d4a85344", color: "#d4a853",
                padding: "10px 28px", borderRadius: 6, cursor: "pointer",
                fontFamily: "'Cinzel',serif", fontSize: 11, letterSpacing: "0.15em",
              }}>↺ RIPROVA</button>
            </div>
          ) : quizData ? (
            <div>
              <p style={{ color: "#c8c0b0", fontSize: 15, lineHeight: 1.7, marginBottom: 18 }}>{quizData.question}</p>
              {quizData.options.map(opt => {
                const letter = opt[0];
                const isCorrect = letter === quizData.correct;
                const isSelected = letter === quizAns;
                let bg = "#10101a", border = "#252530", col = "#c8c0b0";
                if (quizAns) {
                  if (isCorrect) { bg = "#052010"; border = "#2a6a3a"; col = "#7aca8a"; }
                  else if (isSelected) { bg = "#200808"; border = "#6a2a2a"; col = "#ca7a7a"; }
                }
                return (
                  <button key={opt} onClick={() => {
                    if (quizAns) return;
                    setQuizAns(letter);
                    mark(dish, letter === quizData.correct ? "known" : "review");
                  }} style={{
                    display: "block", width: "100%", textAlign: "left",
                    background: bg, border: `1px solid ${border}`, borderRadius: 8,
                    color: col, padding: "12px 16px", marginBottom: 9, fontSize: 14,
                    cursor: quizAns ? "default" : "pointer",
                    fontFamily: "'Cormorant Garamond',serif", transition: "all 0.2s",
                  }}>{opt}</button>
                );
              })}
              {quizAns && (
                <>
                  {quizData.explanation && <p style={{ color: "#907858", fontSize: 13, fontStyle: "italic", margin: "6px 0 14px", lineHeight: 1.6 }}>{quizData.explanation}</p>}
                  <NavBtn primary color={menuMeta?.color} onClick={() => setIdx(i => (i + 1) % filtered.length)}>Prossimo →</NavBtn>
                </>
              )}
            </div>
          ) : null}
        </Page>
      )}

      {/* ── SPEED ──────────────────────────────────────────────── */}
      {mode === MODES.SPEED && (
        <Page>
          <TopBar onBack={() => { clearInterval(timerRef.current); setSpeedActive(false); setMode(MODES.HOME); }} title="Speed Round" />
          <MenuBar onSelect={() => {}} />

          {!speedActive && !speedDone ? (
            <div style={{ textAlign: "center", padding: "44px 0" }}>
              <div style={{ fontSize: 52, marginBottom: 18 }}>⚡</div>
              <p style={{ color: "#907858", lineHeight: 1.8, fontSize: 15, marginBottom: 14, fontStyle: "italic" }}>
                Fino a 8 piatti · 30 secondi
              </p>
              {activeMenu !== "tutti" && (
                <p style={{ color: menuMeta?.color, fontSize: 13, fontFamily: "'Cinzel',serif", letterSpacing: "0.1em", marginBottom: 28 }}>
                  Menu: {menuMeta?.label}
                </p>
              )}
              <button onClick={startSpeed} style={{
                background: menuMeta?.color || "#d4a853", color: "#08080d", border: "none",
                padding: "14px 44px", borderRadius: 6, fontFamily: "'Cinzel',serif",
                fontSize: 13, letterSpacing: "0.2em", cursor: "pointer",
              }}>INIZIA</button>
            </div>
          ) : speedDone ? (
            <div style={{ textAlign: "center", padding: "44px 0" }}>
              <div style={{ fontFamily: "'Cinzel',serif", fontSize: 10, letterSpacing: "0.4em", color: "#d4a853", marginBottom: 12 }}>RISULTATO</div>
              <div style={{ fontSize: 70, fontWeight: 300, color: "#f5f0e8", marginBottom: 6 }}>{speedScore}</div>
              <div style={{ color: "#706858", fontSize: 15, fontStyle: "italic", marginBottom: 36 }}>su {Math.min(speedI + 1, speedQ.length)} piatti</div>
              <button onClick={() => { setSpeedDone(false); startSpeed(); }} style={{
                background: "transparent", color: menuMeta?.color || "#d4a853",
                border: `1px solid ${menuMeta?.color || "#d4a853"}44`,
                padding: "12px 36px", borderRadius: 6, fontFamily: "'Cinzel',serif",
                fontSize: 12, letterSpacing: "0.15em", cursor: "pointer",
              }}>RIPROVA</button>
            </div>
          ) : (
            <div>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
                <div style={{ color: "#504848", fontSize: 12 }}>{speedI + 1} / {speedQ.length}</div>
                <div style={{ fontFamily: "'Cinzel',serif", fontSize: 26, color: timeLeft <= 10 ? "#ca4a4a" : "#d4a853" }}>{timeLeft}s</div>
                <div style={{ color: "#4a8a5a", fontSize: 13 }}>✓ {speedScore}</div>
              </div>
              <ProgressBar val={timeLeft / 30} color={timeLeft <= 10 ? "#ca4a4a" : menuMeta?.color || "#d4a853"} />

              {speedQ[speedI] && (
                <div style={{ background: "#10101a", border: "1px solid #252530", borderRadius: 10, overflow: "hidden", marginTop: 18 }}>
                  <div style={{ height: 130, backgroundImage: `url(${speedQ[speedI].img})`, backgroundSize: "cover", backgroundPosition: "center", position: "relative" }}>
                    <div style={{ position: "absolute", inset: 0, background: "linear-gradient(to bottom,transparent 30%,#10101a 100%)" }} />
                  </div>
                  <div style={{ padding: "18px 22px" }}>
                    <h2 style={{ fontFamily: "'Cinzel',serif", fontWeight: 400, fontSize: "clamp(14px,3.5vw,19px)", color: "#f5f0e8", margin: "0 0 12px", letterSpacing: "0.07em" }}>
                      {speedQ[speedI].name}
                    </h2>
                    {loading ? <Dots /> : <ScriptBlock lines={parseScript(scripts[speedQ[speedI].id])} lc={LABEL_COLOR} compact />}
                  </div>
                </div>
              )}
              {!loading && (
                <div style={{ display: "flex", gap: 10, marginTop: 12 }}>
                  <Btn color="#2a1005" border="#6a3a1a" onClick={() => speedNext(false)}>↩ Da ripassare</Btn>
                  <Btn color="#052010" border="#2a6a3a" onClick={() => speedNext(true)}>✓ Memorizzato</Btn>
                </div>
              )}
            </div>
          )}
        </Page>
      )}

      {/* ── REVIEW ─────────────────────────────────────────────── */}
      {mode === MODES.REVIEW && (
        <Page>
          <TopBar onBack={() => setMode(MODES.HOME)} title="Panoramica" />
          <MenuBar onSelect={() => {}} />

          {MENUS.filter(m => m.id !== "tutti").map(m => {
            const dishes = (activeMenu === "tutti" ? ALL_DISHES : ALL_DISHES.filter(d => d.menus.includes(activeMenu)))
              .filter(d => d.menus.includes(m.id));
            if (!dishes.length) return null;
            return (
              <div key={m.id} style={{ marginBottom: 28 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 12 }}>
                  <div style={{ width: 3, height: 12, background: m.color, borderRadius: 2 }} />
                  <span style={{ fontFamily: "'Cinzel',serif", fontSize: 9, letterSpacing: "0.35em", color: m.color }}>{m.label.toUpperCase()}</span>
                  {m.price && <span style={{ color: "#404040", fontSize: 10 }}>· {m.price}</span>}
                </div>
                {SECTION_ORDER.map(sec => {
                  const items = dishes.filter(d => d.section === sec);
                  if (!items.length) return null;
                  return (
                    <div key={sec}>
                      <div style={{ fontFamily: "'Cinzel',serif", fontSize: 8, letterSpacing: "0.3em", color: "#383838", marginBottom: 6, marginTop: 8 }}>{sec.toUpperCase()}</div>
                      {items.map(d => (
                        <button key={d.id} onClick={() => {
                          setActiveMenu(m.id);
                          const fi = ALL_DISHES.filter(x => x.menus.includes(m.id)).findIndex(x => x.id === d.id);
                          setIdx(Math.max(0, fi));
                          setMode(MODES.CARDS); setFlipped(false);
                        }} style={{
                          display: "flex", alignItems: "center", gap: 12, width: "100%",
                          background: "#0e0e18", border: "1px solid #1e1e28", borderRadius: 8,
                          padding: "11px 14px", marginBottom: 7, cursor: "pointer",
                          fontFamily: "'Cormorant Garamond',serif", textAlign: "left",
                          transition: "border-color 0.2s",
                        }}
                          onMouseEnter={e => e.currentTarget.style.borderColor = m.color + "44"}
                          onMouseLeave={e => e.currentTarget.style.borderColor = "#1e1e28"}
                        >
                          <div style={{ width: 38, height: 38, borderRadius: 5, backgroundImage: `url(${d.img})`, backgroundSize: "cover", backgroundPosition: "center", flexShrink: 0 }} />
                          <div style={{ flex: 1, minWidth: 0 }}>
                            <div style={{ color: "#d8d0c0", fontSize: 14, fontStyle: "italic", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{d.name}</div>
                            <div style={{ color: "#404040", fontSize: 11 }}>{d.price}</div>
                          </div>
                          <div style={{ fontSize: 14, flexShrink: 0, color: progress[d.id] === "known" ? "#4a8a5a" : progress[d.id] === "review" ? "#8a6a2a" : "#282828" }}>
                            {progress[d.id] === "known" ? "✓" : progress[d.id] === "review" ? "↩" : "—"}
                          </div>
                        </button>
                      ))}
                    </div>
                  );
                })}
              </div>
            );
          })}
        </Page>
      )}
    </div>
  );
}

// ─── UI ATOMS ─────────────────────────────────────────────────────
function Page({ children }) {
  return <div style={{ maxWidth: 660, margin: "0 auto", padding: "26px 16px 60px" }}>{children}</div>;
}
function TopBar({ onBack, title, children }) {
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 22 }}>
      <button onClick={onBack} style={{
        background: "transparent", border: "1px solid #252530", color: "#706858",
        padding: "7px 14px", borderRadius: 5, cursor: "pointer",
        fontFamily: "'Cinzel',serif", fontSize: 9, letterSpacing: "0.12em",
      }}>← INDIETRO</button>
      <span style={{ fontFamily: "'Cinzel',serif", fontSize: 10, letterSpacing: "0.35em", color: "#d4a853", flex: 1 }}>{title.toUpperCase()}</span>
      {children}
    </div>
  );
}
function ScriptBlock({ lines, lc, compact }) {
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: compact ? 10 : 15 }}>
      {lines.map(({ label, body }, i) => (
        <div key={i}>
          {label && <div style={{ fontSize: 8, letterSpacing: "0.35em", color: lc[label] || "#d4a853", marginBottom: 4, fontFamily: "'Cinzel',serif" }}>{label}</div>}
          <div style={{ fontSize: compact ? 13 : 15, color: "#c8c0b0", lineHeight: 1.7, fontStyle: "italic" }}>{body}</div>
        </div>
      ))}
    </div>
  );
}
function Stat({ label, val, c }) {
  return (
    <div style={{ textAlign: "center" }}>
      <div style={{ fontSize: 22, fontWeight: 300, color: c }}>{val}</div>
      <div style={{ fontSize: 9, letterSpacing: "0.2em", color: "#504848", fontFamily: "'Cinzel',serif" }}>{label.toUpperCase()}</div>
    </div>
  );
}
function ModeBtn({ icon, title, sub, onClick }) {
  return (
    <button onClick={onClick} style={{
      display: "flex", alignItems: "center", gap: 16,
      background: "#0e0e18", border: "1px solid #1e1e28",
      borderRadius: 10, padding: "18px 20px", cursor: "pointer",
      fontFamily: "'Cormorant Garamond',serif", textAlign: "left", transition: "border-color 0.25s",
    }}
      onMouseEnter={e => e.currentTarget.style.borderColor = "#d4a85555"}
      onMouseLeave={e => e.currentTarget.style.borderColor = "#1e1e28"}
    >
      <span style={{ fontSize: 20, color: "#d4a853" }}>{icon}</span>
      <div>
        <div style={{ fontFamily: "'Cinzel',serif", fontSize: 14, color: "#f5f0e8", letterSpacing: "0.07em", marginBottom: 3 }}>{title}</div>
        <div style={{ fontSize: 13, color: "#706858", fontStyle: "italic" }}>{sub}</div>
      </div>
    </button>
  );
}
function ProgressBar({ val, color = "#d4a853" }) {
  return (
    <div style={{ height: 1, background: "#1e1e28", borderRadius: 2, overflow: "hidden", marginBottom: 8 }}>
      <div style={{ height: "100%", width: `${val * 100}%`, background: color, transition: "width 0.4s ease" }} />
    </div>
  );
}
function Btn({ children, color, border, onClick }) {
  return (
    <button onClick={onClick} style={{
      flex: 1, background: color, border: `1px solid ${border}`,
      color: "#d8d0c0", padding: "13px", borderRadius: 7, cursor: "pointer",
      fontFamily: "'Cormorant Garamond',serif", fontSize: 15,
    }}>{children}</button>
  );
}
function NavBtn({ children, onClick, primary, color }) {
  return (
    <button onClick={onClick} style={{
      flex: 1, background: primary ? "#1a1a28" : "transparent",
      border: `1px solid ${primary ? "#303045" : "#1e1e28"}`,
      color: primary ? (color || "#d4a853") : "#504848",
      padding: "12px", borderRadius: 7, cursor: "pointer",
      fontFamily: "'Cinzel',serif", fontSize: 10, letterSpacing: "0.12em",
    }}>{children}</button>
  );
}
function Dots() {
  return <div style={{ textAlign: "center", padding: "26px 0", color: "#d4a853", letterSpacing: "0.4em", fontSize: 20 }}>· · ·</div>;
}


// Mount
const container = document.getElementById('app-root');
const root = ReactDOM.createRoot(container);
root.render(React.createElement(App));

</script>

</body>
</html>
